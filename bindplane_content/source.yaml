apiVersion: bindplane.observiq.com/v1
kind: Source
metadata:
    name: SQLQuery_MSSQL
    displayName: SQL Server
spec:
    type: sqlquery_v2
    parameters:
        - name: driver
          value: sqlserver
        - name: connection_string_type
          value: Builder
        - name: hostname
          value: localhost
        - name: instance
          value: MSSQLSERVER
        - name: port_postgres
          value: 5432
        - name: port_mysql
          value: 3306
        - name: port_snowflake
          value: 443
        - name: port_sqlserver
          value: 1433
        - name: port_oracle
          value: 1521
        - name: postgres_database
          value: ""
        - name: mysql_database
          value: ""
        - name: snowflake_database
          value: ""
        - name: sqlserver_database
          value: bindplane-test
        - name: oracle_database
          value: ""
        - name: username
          value: bindplane
        - name: password
          value: (sensitive)
          sensitive: true
        - name: postgres_additional_params
          value:
            sslmode: disable
        - name: mysql_additional_params
          value: {}
        - name: snowflake_additional_params
          value: {}
        - name: sqlserver_additional_params
          value: {}
        - name: oracle_additional_params
          value: {}
        - name: query
          value: select * FROM Log WHERE id > @p1
        - name: body_column
          value: message
        - name: attribute_columns
          value:
            - id
            - timestamp
            - level
            - source
            - user_id
        - name: tracking_column
          value: id
        - name: tracking_start_value
          value: "1"
        - name: interval
          value: 10s
        - name: enable_storage
          value: true
        - name: enable_log_query_logging
          value: true
---
