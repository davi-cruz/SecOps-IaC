---
apiVersion: bindplane.observiq.com/v1
kind: Source
metadata:
    name: Bindplane-Agent
spec:
    type: bindplane-agent
    parameters:
        - name: telemetry_types
          value:
            - Logs
        - name: log_path
          value: ${OIQ_OTEL_COLLECTOR_HOME}/log/collector.log
        - name: enable_offset_storage
          value: true
        - name: offset_storage_dir
          value: ${OIQ_OTEL_COLLECTOR_HOME}/storage
        - name: start_at
          value: end
        - name: process_metrics
          value: true
        - name: receiver_metrics
          value: true
        - name: processor_metrics
          value: true
        - name: exporter_metrics
          value: true
        - name: metrics_port
          value: 8888
        - name: collection_interval
          value: 60
        - name: updater_log_path
          value: ${OIQ_OTEL_COLLECTOR_HOME}/log/updater.log
        - name: enable_stderr_log
          value: true
        - name: stderr_log_path_windows
          value: ${OIQ_OTEL_COLLECTOR_HOME}/log/observiq_collector.err
        - name: stderr_log_path_macos
          value: /var/log/observiq_collector.err
---
apiVersion: bindplane.observiq.com/v1
kind: Source
metadata:
    name: Bindplane-Gateway
    displayName: GatewayCollector
spec:
    type: bindplane_gateway
    parameters:
        - name: telemetry_types
          value:
            - Logs
        - name: listen_address
          value: 0.0.0.0
        - name: grpc_port
          value: 4317
        - name: http_port
          value: 4318
        - name: grpc_max_recv_msg_size_mib
          value: 20
        - name: enable_tls
          value: false
        - name: cert_file
          value: ""
        - name: key_file
          value: ""
        - name: mutual_tls
          value: false
        - name: ca_file
          value: ""
        - name: enable_grpc_timeout
          value: true
        - name: grpc_max_connection_idle
          value: 60
        - name: grpc_max_connection_age
          value: 60
        - name: grpc_max_connection_age_grace
          value: 300
        - name: enable_topology
          value: true
        - name: topology_interval
          value: 1m
        - name: include_metadata
          value: false
        - name: enable_cors
          value: false
        - name: cors_allowed_origins
          value: []
        - name: cors_allowed_headers
          value: []
        - name: cors_max_age
          value: 0
        - name: enable_http_timeout
          value: true
        - name: http_read_timeout
          value: 0
