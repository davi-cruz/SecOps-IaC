apiVersion: bindplane.observiq.com/v1
kind: Blueprint
metadata:
    name: parse-regex-bundle
    displayName: Parse Timestamp
spec:
    type: processor_bundle
    parameters:
        - name: processors
          value: []
    processors:
        - id: 01JWE5RXCV0726P1PARWN4AWX4
          displayName: Parse Regex
          description: 'Extracts a timestamp field from the log body using a regex pattern. This processor searches the body for a timestamp in the format timestamp: value, and creates a new field named ''timestamp'' that can be parsed by the Parse Timestamp processor.'
          type: parse_regex
          parameters:
            - name: telemetry_types
              value:
                - Logs
            - name: log_condition
              value: "true"
            - name: log_source_field_type
              value: Body
            - name: log_regex_pattern
              value: timestamp":\s*"(?P<timestamp>[^"]+)
            - name: log_body_source_field
              value: ""
            - name: log_target_field_type
              value: Body
            - name: metric_condition
              value: ""
            - name: metric_source_field_type
              value: Attribute
            - name: metric_target_field_type
              value: Attribute
            - name: trace_condition
              value: ""
            - name: trace_source_field_type
              value: Attribute
            - name: trace_target_field_type
              value: Attribute
          licenseEnabled: true
        - id: 01JWE5S9SXMRS31A0M2BEJ0D1S
          displayName: Parse Timestamp
          description: Converts the extracted timestamp string into a proper timestamp format. This processor takes the 'timestamp' field and converts it into a valid timestamp in the log body.
          type: parse_timestamp
          parameters:
            - name: telemetry_types
              value:
                - Logs
            - name: log_condition
              value: "true"
            - name: log_field_type
              value: Attribute
            - name: log_source_field
              value: timestamp
            - name: log_time_format
              value: RFC3339
            - name: log_epoch_layout
              value: s
            - name: log_manual_timestamp_layout
              value: '%Y-%m-%dT%H:%M:%S.%f%z'
            - name: log_location
              value: ""
            - name: log_locale
              value: ""
            - name: metric_condition
              value: ""
            - name: metric_field_type
              value: Attribute
            - name: metric_time_format
              value: RFC3339
            - name: metric_epoch_layout
              value: s
            - name: metric_manual_timestamp_layout
              value: '%Y-%m-%dT%H:%M:%S.%f%z'
            - name: metric_location
              value: ""
            - name: metric_locale
              value: ""
            - name: trace_condition
              value: ""
            - name: trace_field_type
              value: Attribute
            - name: trace_time_format
              value: RFC3339
            - name: trace_epoch_layout
              value: s
            - name: trace_manual_timestamp_layout
              value: '%Y-%m-%dT%H:%M:%S.%f%z'
            - name: trace_location
              value: ""
            - name: trace_locale
              value: ""
          licenseEnabled: true
        - id: 01JWE5SJJ8MTER1WJ3BK59D1DS
          displayName: Delete Fields
          description: Removes the original timestamp field after it has been parsed.
          type: delete_fields_v2
          parameters:
            - name: telemetry_types
              value:
                - Logs
            - name: condition
              value: "true"
            - name: attributes
              value:
                - timestamp
            - name: body_keys
              value: []
            - name: resource_attributes
              value: []
          licenseEnabled: true
---
apiVersion: bindplane.observiq.com/v1
kind: Blueprint
metadata:
    name: rfc3164-timestamp-rewrite-bundle
    displayName: Rewrite Timestamps to RFC5424
spec:
    type: processor_bundle
    parameters:
        - name: processors
          value: []
    processors:
        - id: 01K5C4234E2R2Q8PQG0PJ22PY2
          displayName: Parse Regex
          description: 'Parses the log body into three attributes: ''pre_ts'', ''timestamp'', and ''post_ts''. The ''timestamp'' field is now available for further parsing into the time field.'
          type: parse_regex
          parameters:
            - name: telemetry_types
              value:
                - Logs
            - name: log_condition
              value: "true"
            - name: log_source_field_type
              value: Body
            - name: log_target_field_type
              value: Body
            - name: log_regex_pattern
              value: ^(?P<pre_ts>\<.+\>)?\s*(?P<timestamp>\w+\s{1,2}\d{1,2}\s+\d{1,2}:\d{1,2}:\d{1,2})\s+(?P<post_ts>.+)
            - name: log_body_source_field
              value: ""
            - name: metric_condition
              value: ""
            - name: metric_source_field_type
              value: Attribute
            - name: metric_target_field_type
              value: Attribute
            - name: trace_condition
              value: ""
            - name: trace_source_field_type
              value: Attribute
            - name: trace_target_field_type
              value: Attribute
          licenseEnabled: true
        - id: 01K5C42M36BXYE6W02KZCZD70Q
          displayName: Parse Timestamp
          description: Converts the extracted timestamp string into a proper timestamp format. This processor takes the 'timestamp' field and converts it into a valid timestamp in the log body.
          type: parse_timestamp
          parameters:
            - name: telemetry_types
              value:
                - Logs
            - name: log_condition
              value: "true"
            - name: log_field_type
              value: Body
            - name: log_source_field
              value: timestamp
            - name: log_time_format
              value: Manual
            - name: log_manual_timestamp_layout
              value: '%b %d %X'
            - name: log_location
              value: UTC
            - name: log_epoch_layout
              value: s
            - name: log_locale
              value: ""
            - name: metric_condition
              value: ""
            - name: metric_field_type
              value: Attribute
            - name: metric_time_format
              value: RFC3339
            - name: metric_epoch_layout
              value: s
            - name: metric_manual_timestamp_layout
              value: '%Y-%m-%dT%H:%M:%S.%f%z'
            - name: metric_location
              value: ""
            - name: metric_locale
              value: ""
            - name: trace_condition
              value: ""
            - name: trace_field_type
              value: Attribute
            - name: trace_time_format
              value: RFC3339
            - name: trace_epoch_layout
              value: s
            - name: trace_manual_timestamp_layout
              value: '%Y-%m-%dT%H:%M:%S.%f%z'
            - name: trace_location
              value: ""
            - name: trace_locale
              value: ""
          licenseEnabled: true
        - id: 01K5C42MFVJR46B024XHY6Y3VF
          displayName: Rewrite Timestamp
          description: Rewrites the timestamp in the log body to a new format. This processor takes the 'time' field and rewrites it to a new format, which is now in syslog rfc5424 format.
          type: rewrite-timestamp
          parameters:
            - name: telemetry_types
              value: Logs
            - name: log_condition
              value: "true"
            - name: log_target_field_type
              value: Body
            - name: log_target_field
              value: timestamp
            - name: log_timestamp_format
              value: '%b %e %Y %H:%M:%S %j'
            - name: metric_condition
              value: ""
            - name: metric_target_field_type
              value: Attributes
            - name: metric_target_field
              value: ""
            - name: metric_timestamp_format
              value: '%b %e %Y %H:%M:%S'
            - name: trace_condition
              value: ""
            - name: trace_target_field_type
              value: Attributes
            - name: trace_target_field
              value: ""
            - name: trace_timestamp_format
              value: '%b %e %Y %H:%M:%S'
          licenseEnabled: true
        - id: 01JY4KCMBP878E98YYESD0Y158
          displayName: Concatenate Fields
          description: Concatenates the 'pre_ts', 'timestamp', and 'post_ts' fields into a single log body field.
          type: concat
          parameters:
            - name: telemetry_types
              value: Logs
            - name: log_condition
              value: "true"
            - name: log_target_field_type
              value: Body
            - name: log_target_field
              value: ""
            - name: log_source_field_type
              value: Body
            - name: log_source_fields
              value:
                - pre_ts
                - timestamp
                - post_ts
            - name: log_delimiter
              value: ""
            - name: log_body_target_field
              value: ""
            - name: metric_condition
              value: ""
            - name: metric_source_field_type
              value: Attributes
            - name: metric_target_field_type
              value: Attributes
            - name: metric_target_field
              value: ""
            - name: metric_delimiter
              value: ' '
            - name: trace_condition
              value: ""
            - name: trace_source_field_type
              value: Attributes
            - name: trace_target_field_type
              value: Attributes
            - name: trace_target_field
              value: ""
            - name: trace_delimiter
              value: ' '
          licenseEnabled: true
