---
apiVersion: bindplane.observiq.com/v1
kind: Processor
metadata:
    name: Claroty
spec:
    type: google_secops_standardization
    parameters:
        - name: telemetry_types
          value:
            - Logs
        - name: secops_field
          value:
            - condition:
                ottl: attributes["net.peer.ip"] == "18.229.12.159"
                ui:
                    operator: ""
                    statements:
                        - key: net.peer.ip
                          match: attributes
                          operator: Equals
                          value: 18.229.12.159
              ingestionLabels: {}
              logType: CLAROTY_XDOME
              namespace: ""
            - condition:
                ottl: attributes["net.peer.ip"] == "54.198.99.210"
                ui:
                    operator: ""
                    statements:
                        - key: net.peer.ip
                          match: attributes
                          operator: Equals
                          value: 54.198.99.210
              ingestionLabels: {}
              logType: CLAROTY_XDOME_SECURE_ACCESS
              namespace: ""
---
apiVersion: bindplane.observiq.com/v1
kind: Blueprint
metadata:
    name: deduplicate-windows-events-rendering-info
    displayName: Deduplicate Windows Events Rendering Info
spec:
    type: processor_bundle
    parameters:
        - name: processors
          value: []
    processors:
        - id: 01REND-INFO1
          displayName: Deduplicate Windows Events Rendering Info
          description: Finds and deletes the duplicate instance of Rendering Info within a Windows event.
          type: transform
          parameters:
            - name: telemetry_type
              value: Logs
            - name: statements
              value:
                - replace_pattern(attributes["log.record.original"], "</RenderingInfo>.*", "$1</RenderingInfo></Event>")
            - name: conditions
              value: []
            - name: error_mode
              value: ignore
            - name: logs_context
              value: log
            - name: metrics_context
              value: datapoint
            - name: traces_context
              value: span
          licenseEnabled: true
