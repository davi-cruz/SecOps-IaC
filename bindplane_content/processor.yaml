                    - key: '["chronicle_ingestion_label"]["ingestion_source"]'
                      match: attributes
                      operator: DoesNotExist
                      value: ""
        - name: from_base
          value: Resource
        - name: from_attributes
          value: ""
        - name: from_body
          value: ""
        - name: from_resource
          value: host.name
        - name: to_base
          value: Attributes
        - name: to_attributes
          value: '["chronicle_ingestion_label"]["ingestion_source"]'
        - name: to_body
          value: ""
