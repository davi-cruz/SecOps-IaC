apiVersion: bindplane.observiq.com/v1
kind: Destination
metadata:
    name: SecOpsLatamGaia-HTTPS
spec:
    type: chronicle
    parameters:
        - name: protocol
          value: https
        - name: region
          value: us
        - name: endpoint
          value: malachiteingestion-pa.googleapis.com
        - name: auth_type
          value: json
        - name: credentials
          value: (sensitive)
          sensitive: true
        - name: credentials_file
          value: /path/to/json
        - name: log_type
          value: CATCH_ALL
        - name: customer_id
          value: 14017248-91b1-4217-9e51-8c3aa4cba640
        - name: project
          value: "117670667466"
        - name: send_single_field
          value: true
        - name: raw_base
          value: Body
        - name: raw_attributes
          value: ""
        - name: raw_body
          value: ""
        - name: ingestion_labels
          value: {}
        - name: namespace
          value: ""
        - name: compression
          value: gzip
        - name: timeout
          value: 90
        - name: enable_batch_limit
          value: false
        - name: batch_request_size_limit
          value: 1.048576e+06
        - name: log_errored_payloads
          value: false
        - name: drop_raw_copy
          value: true
        - name: retry_on_failure_enabled
          value: true
        - name: retry_on_failure_initial_interval
          value: 5
        - name: retry_on_failure_max_interval
          value: 30
        - name: retry_on_failure_max_elapsed_time
          value: 300
        - name: sending_queue_enabled
          value: true
        - name: sending_queue_num_consumers
          value: 10
        - name: sending_queue_queue_size
          value: 5000
        - name: persistent_queue_enabled
          value: true
        - name: persistent_queue_storage_extension
          value:
            disabled: false
            parameters:
                - name: persistent_queue_directory
                  value: ${OIQ_OTEL_COLLECTOR_HOME}/storage
                - name: persistent_queue_fsync
                  value: false
                - name: timeout
                  value: 1
            type: file_storage_persistent_queue
        - name: https_endpoint
          value: chronicle.googleapis.com
        - name: override_endpoint
          value: false
        - name: api_version
          value: v1alpha
        - name: metrics_interval
          value: 5m