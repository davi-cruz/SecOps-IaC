# Pull the latest version of all rules and reference lists from Google SecOps and commit them to the GitHub repo.

name: Pull Latest Content - test

on:
  schedule:
  # Run daily at 23:05 UTC time
  - cron: "5 23 * * *"

  # workflow_dispatch allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

permissions:
  contents: write
  # 'id-token: write' is required to allow GitHub's OIDC provider to create a JSON Web Token for every run
  id-token: write

jobs:
  job_id:
    # Any runner supporting Node 20 or newer
    runs-on: ubuntu-latest

    # Add "id-token" with the intended permissions.
    permissions:
      contents: 'read'
      id-token: 'write'

    steps:
    - uses: 'actions/checkout@v4'

    - uses: 'google-github-actions/auth@v3'
      with:
        project_id: 'secops-gaia'
        workload_identity_provider: 'projects/117670667466/locations/global/workloadIdentityPools/github-pool/providers/davi-cruz-actions-secops-iac'
