# Static analysis of GitHub Actions workflows using zizmor.
# This workflow runs whenever a workflow file is created or updated.

name: SecOps - Zizmor Scan

on:
  push:
    paths:
      - '.github/workflows/**'
  pull_request:
    paths:
      - '.github/workflows/**'
  workflow_dispatch:

jobs:
  zizmor:
    name: Zizmor Linter
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false

      - name: Run zizmor
        run: pipx run zizmor --format=github .github/workflows/
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
